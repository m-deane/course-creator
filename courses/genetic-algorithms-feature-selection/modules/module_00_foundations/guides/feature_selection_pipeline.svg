<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="830" height="400" viewBox="0 0 830 400" font-family="Inter, sans-serif">
  <style>text { font-family: Inter, sans-serif; } .heading { font-family: Georgia, serif; font-weight: 700; } .code { font-family: JetBrains Mono, monospace; }</style>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feOffset dx="0" dy="2" in="SourceAlpha" result="offOut" />
      <feGaussianBlur in="offOut" stdDeviation="3" result="blurOut" />
      <feBlend in="SourceGraphic" in2="blurOut" mode="normal" />
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 8 4, 0 8" fill="#757575" />
    </marker>
  </defs>
  <text x="415" y="36" text-anchor="middle" dominant-baseline="middle" class="heading" font-size="22" fill="#1a1a2e">GA Feature Selection Pipeline</text>
  <text x="80" y="95" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#424242" class="heading" font-weight="700">Data</text>
  <rect x="130" y="62" width="670" height="66" rx="8" ry="8" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,4" opacity="0.5" />
  <rect x="310" y="70" width="140" height="50" rx="12" ry="12" fill="#ffffff" stroke="#9e9e9e" stroke-width="2" filter="url(#shadow)" />
  <text x="380" y="95" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#424242" font-weight="600">Raw Features</text>
  <rect x="480" y="70" width="140" height="50" rx="12" ry="12" fill="#ffffff" stroke="#9e9e9e" stroke-width="2" filter="url(#shadow)" />
  <text x="550" y="95" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#424242" font-weight="600">Preprocessing</text>
  <text x="80" y="225" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1b5e20" class="heading" font-weight="700">GA Engine</text>
  <rect x="130" y="192" width="670" height="66" rx="8" ry="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1" stroke-dasharray="4,4" opacity="0.5" />
  <rect x="140" y="200" width="140" height="50" rx="12" ry="12" fill="#ffffff" stroke="#4caf50" stroke-width="2" filter="url(#shadow)" />
  <text x="210" y="225" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#1b5e20" font-weight="600">Population</text>
  <rect x="310" y="200" width="140" height="50" rx="12" ry="12" fill="#ffffff" stroke="#4caf50" stroke-width="2" filter="url(#shadow)" />
  <text x="380" y="225" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#1b5e20" font-weight="600">Fitness Eval</text>
  <rect x="480" y="200" width="140" height="50" rx="12" ry="12" fill="#ffffff" stroke="#4caf50" stroke-width="2" filter="url(#shadow)" />
  <text x="550" y="225" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#1b5e20" font-weight="600">Selection</text>
  <rect x="650" y="200" width="140" height="50" rx="12" ry="12" fill="#ffffff" stroke="#4caf50" stroke-width="2" filter="url(#shadow)" />
  <text x="720" y="225" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#1b5e20" font-weight="600">Operators</text>
  <text x="80" y="355" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#0d47a1" class="heading" font-weight="700">Output</text>
  <rect x="130" y="322" width="670" height="66" rx="8" ry="8" fill="#e3f2fd" stroke="#2196f3" stroke-width="1" stroke-dasharray="4,4" opacity="0.5" />
  <rect x="225" y="330" width="140" height="50" rx="12" ry="12" fill="#ffffff" stroke="#2196f3" stroke-width="2" filter="url(#shadow)" />
  <text x="295" y="355" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#0d47a1" font-weight="600">Best Features</text>
  <rect x="395" y="330" width="140" height="50" rx="12" ry="12" fill="#ffffff" stroke="#2196f3" stroke-width="2" filter="url(#shadow)" />
  <text x="465" y="355" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#0d47a1" font-weight="600">Model Training</text>
  <rect x="565" y="330" width="140" height="50" rx="12" ry="12" fill="#ffffff" stroke="#2196f3" stroke-width="2" filter="url(#shadow)" />
  <text x="635" y="355" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#0d47a1" font-weight="600">Evaluation</text>
  <line x1="550" y1="120" x2="210" y2="192" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="210" y1="250" x2="380" y2="192" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="380" y1="250" x2="550" y2="192" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="550" y1="250" x2="720" y2="192" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="720" y1="250" x2="210" y2="192" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="295" y1="380" x2="465" y2="322" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="465" y1="380" x2="635" y2="322" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
</svg>