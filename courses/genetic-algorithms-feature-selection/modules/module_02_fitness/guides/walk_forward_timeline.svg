<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="230" viewBox="0 0 1120 230" font-family="Inter, sans-serif">
  <style>text { font-family: Inter, sans-serif; } .heading { font-family: Georgia, serif; font-weight: 700; } .code { font-family: JetBrains Mono, monospace; }</style>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feOffset dx="0" dy="2" in="SourceAlpha" result="offOut" />
      <feGaussianBlur in="offOut" stdDeviation="3" result="blurOut" />
      <feBlend in="SourceGraphic" in2="blurOut" mode="normal" />
    </filter>
  </defs>
  <text x="560" y="36" text-anchor="middle" dominant-baseline="middle" class="heading" font-size="22" fill="#1a1a2e">Walk-Forward Validation</text>
  <line x1="20" y1="130" x2="920" y2="130" stroke="#e0e0e0" stroke-width="3" />
  <circle cx="20" cy="130" r="10" fill="#4caf50" stroke="#ffffff" stroke-width="3" />
  <text x="20" y="105" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#1b5e20" font-weight="700">Train 1</text>
  <text x="20" y="155" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#757575">t0 to t1</text>
  <circle cx="200" cy="130" r="10" fill="#2196f3" stroke="#ffffff" stroke-width="3" />
  <text x="200" y="105" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#0d47a1" font-weight="700">Test 1</text>
  <text x="200" y="155" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#757575">t1 to t2</text>
  <circle cx="380" cy="130" r="10" fill="#4caf50" stroke="#ffffff" stroke-width="3" />
  <text x="380" y="105" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#1b5e20" font-weight="700">Train 2</text>
  <text x="380" y="155" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#757575">t0 to t2</text>
  <circle cx="560" cy="130" r="10" fill="#2196f3" stroke="#ffffff" stroke-width="3" />
  <text x="560" y="105" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#0d47a1" font-weight="700">Test 2</text>
  <text x="560" y="155" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#757575">t2 to t3</text>
  <circle cx="740" cy="130" r="10" fill="#4caf50" stroke="#ffffff" stroke-width="3" />
  <text x="740" y="105" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#1b5e20" font-weight="700">Train 3</text>
  <text x="740" y="155" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#757575">t0 to t3</text>
  <circle cx="920" cy="130" r="10" fill="#2196f3" stroke="#ffffff" stroke-width="3" />
  <text x="920" y="105" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#0d47a1" font-weight="700">Test 3</text>
  <text x="920" y="155" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#757575">t3 to t4</text>
</svg>