  <rect x="55" y="142" width="70" height="20" rx="10" ry="10" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" />
  <text x="90" y="152" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#757575">contains</text>
