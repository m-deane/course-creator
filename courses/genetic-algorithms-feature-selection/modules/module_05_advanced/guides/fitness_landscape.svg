<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="620" height="270" viewBox="0 0 620 270" font-family="Inter, sans-serif">
  <style>text { font-family: Inter, sans-serif; } .heading { font-family: Georgia, serif; font-weight: 700; } .code { font-family: JetBrains Mono, monospace; }</style>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feOffset dx="0" dy="2" in="SourceAlpha" result="offOut" />
      <feGaussianBlur in="offOut" stdDeviation="3" result="blurOut" />
      <feBlend in="SourceGraphic" in2="blurOut" mode="normal" />
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 8 4, 0 8" fill="#757575" />
