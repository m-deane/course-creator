  <rect x="240" y="200" width="140" height="50" rx="12" ry="12" fill="#f3e5f5" stroke="#7c4dff" stroke-width="2" filter="url(#shadow)" />
  <text x="310" y="225" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#4a148c" font-weight="600">Population
Diversity</text>
  <line x1="160" y1="95" x2="302" y2="95" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="165" y="77" width="70" height="20" rx="10" ry="10" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" />
