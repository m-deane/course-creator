<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1250" height="150" viewBox="0 0 1250 150" font-family="Inter, sans-serif">
  <style>text { font-family: Inter, sans-serif; } .heading { font-family: Georgia, serif; font-weight: 700; } .code { font-family: JetBrains Mono, monospace; }</style>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feOffset dx="0" dy="2" in="SourceAlpha" result="offOut" />
      <feGaussianBlur in="offOut" stdDeviation="3" result="blurOut" />
      <feBlend in="SourceGraphic" in2="blurOut" mode="normal" />
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 8 4, 0 8" fill="#757575" />
    </marker>
  </defs>
  <text x="625" y="36" text-anchor="middle" dominant-baseline="middle" class="heading" font-size="22" fill="#1a1a2e">Genetic Algorithm Lifecycle</text>
  <rect x="20" y="70" width="160" height="60" rx="12" ry="12" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" filter="url(#shadow)" />
  <circle cx="40" cy="100" r="12" fill="#4caf50" />
  <text x="40" y="100" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#ffffff" font-weight="700">1</text>
  <text x="110" y="100" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#1b5e20" font-weight="600">Initialize
Population</text>
  <line x1="180" y1="100" x2="222" y2="100" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="230" y="70" width="160" height="60" rx="12" ry="12" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" filter="url(#shadow)" />
  <circle cx="250" cy="100" r="12" fill="#2196f3" />
  <text x="250" y="100" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#ffffff" font-weight="700">2</text>
  <text x="320" y="100" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#0d47a1" font-weight="600">Evaluate
Fitness</text>
  <line x1="390" y1="100" x2="432" y2="100" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="440" y="70" width="160" height="60" rx="12" ry="12" fill="#fff8e1" stroke="#ff9800" stroke-width="2" filter="url(#shadow)" />
  <circle cx="460" cy="100" r="12" fill="#ff9800" />
  <text x="460" y="100" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#ffffff" font-weight="700">3</text>
  <text x="530" y="100" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#e65100" font-weight="600">Selection</text>
  <line x1="600" y1="100" x2="642" y2="100" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="650" y="70" width="160" height="60" rx="12" ry="12" fill="#f3e5f5" stroke="#7c4dff" stroke-width="2" filter="url(#shadow)" />
  <circle cx="670" cy="100" r="12" fill="#7c4dff" />
  <text x="670" y="100" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#ffffff" font-weight="700">4</text>
  <text x="740" y="100" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#4a148c" font-weight="600">Crossover</text>
  <line x1="810" y1="100" x2="852" y2="100" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="860" y="70" width="160" height="60" rx="12" ry="12" fill="#fce4ec" stroke="#ef5350" stroke-width="2" filter="url(#shadow)" />
  <circle cx="880" cy="100" r="12" fill="#ef5350" />
  <text x="880" y="100" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#ffffff" font-weight="700">5</text>
  <text x="950" y="100" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#b71c1c" font-weight="600">Mutation</text>
  <line x1="1020" y1="100" x2="1062" y2="100" stroke="#757575" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="1070" y="70" width="160" height="60" rx="12" ry="12" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" filter="url(#shadow)" />
  <circle cx="1090" cy="100" r="12" fill="#4caf50" />
  <text x="1090" y="100" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#ffffff" font-weight="700">6</text>
  <text x="1160" y="100" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#1b5e20" font-weight="600">New
Generation</text>
</svg>